<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Sports Live</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; max-width: 400px; margin: auto; padding: 20px; border-radius: 15px; border-bottom: 5px solid #ef4444; }
        .live-tag { background: #ef4444; padding: 20px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        h1 { font-size: 20px; margin: 10px 0; }
        .score { font-size: 32px; font-weight: bold; color: #facc15; margin: 15px 0; }
        .status { color: #94a3b8; font-style: italic; }
        .footer { margin-top: 20px; font-size: 10px; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="live-tag">{{ match.format }}</div>
        <h1>{{ match.title }}</h1>
        <div class="score">{{ match.score }}</div>
        <div class="status">{{ match.status }}</div>
        <div class="footer">Core News 24x7 | Harsh Pratap Singh</div>
        <div style="margin-top:15px;">
            <img src="https://hitwebcounter.com/counter/counter.php?page=10000001&style=0006&nbdigits=5&type=page&initCount=0" border="0" />
        </div>
    </div>
</body>
</html>
