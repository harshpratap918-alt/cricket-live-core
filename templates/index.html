<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Sports Live</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #eef2f3; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); display: inline-block; min-width: 320px; border-top: 5px solid #d32f2f; }
        h1 { color: #d32f2f; margin-bottom: 5px; }
        .brand { font-size: 14px; color: #777; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }
        .score { font-size: 26px; font-weight: bold; margin: 15px 0; color: #333; }
        .status { color: #2e7d32; font-weight: 500; background: #e8f5e9; padding: 5px 10px; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Core Sports News</h1>
        <div class="brand">Network by Harsh Chouhan</div>
        <hr>
        <div class="score">{{ match.title }}</div>
        <div class="score" style="color: #1976d2;">{{ match.score }}</div>
        <div class="status">{{ match.status }}</div>
    </div>
</body>
</html>
