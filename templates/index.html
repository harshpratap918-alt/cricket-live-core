<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Sports Live - Harsh Chouhan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #d32f2f; }
        h1 { color: #d32f2f; margin: 10px 0; font-size: 28px; }
        .format-badge { background: #333; color: white; padding: 5px 15px; border-radius: 50px; font-size: 12px; display: inline-block; margin-bottom: 20px; }
        .match-title { font-size: 22px; font-weight: bold; color: #1a1a1a; margin-bottom: 10px; }
        .score-box { background: #fff5f5; padding: 20px; border-radius: 15px; border: 1px dashed #d32f2f; margin: 20px 0; }
        .score-text { font-size: 24px; color: #d32f2f; font-weight: bold; }
        .status { color: #2e7d32; font-weight: bold; font-size: 14px; }
        .footer { margin-top: 30px; font-size: 12px; color: #777; }
        .counter { margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Core Sports 24x7</h1>
        <div class="format-badge">{{ match.format }}</div>
        
        <div class="match-title">{{ match.title }}</div>
        
        <div class="score-box">
            <div class="score-text">{{ match.score }}</div>
        </div>
        
        <div class="status">{{ match.full_status }}</div>

        <div class="footer">
            <p>Developed by Harsh Pratap Singh Chouhan</p>
            <div class="counter">
                <p>Total Visitors</p>
                <img src="https://hitwebcounter.com/counter/counter.php?page=10000001&style=0006&nbdigits=5&type=page&initCount=0" title="Free Counter" border="0" />
            </div>
        </div>
    </div>
</body>
</html>
