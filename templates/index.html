<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10">
    <title>Core Sports Live Score</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .scoreboard {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid #e94560;
            width: 400px;
        }
        h1 {
            color: #e94560;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .teams {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 20px 0;
        }
        .score {
            font-size: 3rem;
            color: #f9f9f9;
            margin: 10px 0;
        }
        .overs {
            font-size: 1.2rem;
            color: #00d2ff;
        }
        .status {
            margin-top: 20px;
            font-style: italic;
            color: #ffd700;
        }
        .footer {
            margin-top: 25px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="scoreboard">
        <h1>Core Sports Live</h1>
        <hr style="border: 0.5px solid #333;">
        
        <div class="teams">{{ data.teams }}</div>
        <div class="score">{{ data.score }}</div>
        <div class="overs">Overs: {{ data.overs }}</div>
        
        <div class="status">{{ data.status }}</div>

        <div class="footer">
            Powered by Harsh Pratap News Network
        </div>
    </div>

</body>
</html>
