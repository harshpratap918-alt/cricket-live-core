<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Sports Live</title>
    <style>
        body { font-family: sans-serif; background: #06173d; color: white; margin: 0; text-align: center; }
        .header { background: #e41b23; padding: 15px; font-weight: bold; font-size: 20px; }
        .match-card { background: white; color: black; margin: 15px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .live-label { color: red; font-weight: bold; font-size: 12px; }
        .score { font-size: 22px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header">CORE SPORTS 24x7</div>
    <div class="container">
        {% if matches %}
            {% for match in matches %}
                <div class="match-card">
                    <div class="live-label">● LIVE NOW</div>
                    <h3>Recent Match Results</h3>
                    <p>{{ match.matchType }}</p>
                    <div class="status">Click for full scorecard</div>
                </div>
            {% endfor %}
        {% else %}
            <div style="padding: 50px;">
                <h3>Connecting to Stadium...</h3>
                <p>Refresh after 1 minute.</p>
            </div>
        {% endif %}
    </div>
    <div style="margin-top:20px;">
        <img src="https://hitwebcounter.com/counter/counter.php?page=10000001&style=0006&nbdigits=5&type=page&initCount=0" />
    </div>
</body>
</html>
