<div class="container" style="max-width: 500px; margin: auto; font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; border-radius: 15px;">
    <h1 style="color: #ef4444;">Core Sports Live</h1>
    
    {% if matches %}
        {% for match in matches %}
        <div style="background: #1e293b; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-left: 5px solid #facc15;">
            <div style="color: #ef4444; font-weight: bold; font-size: 12px;">LIVE NOW</div>
            <h3 style="margin: 10px 0;">{{ match.title }}</h3>
            <h2 style="color: #facc15; margin: 10px 0;">{{ match.current_score }}</h2>
            <p style="font-size: 12px; color: #94a3b8;">{{ match.status_text }}</p>
        </div>
        {% endfor %}
    {% else %}
        <div style="padding: 20px;">
            <h3>Updating...</h3>
            <p>Please refresh in 1 minute. Stadium connection is resetting.</p>
        </div>
    {% endif %}

    <div style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
        <img src="https://hitwebcounter.com/counter/counter.php?page=10000001&style=0006&nbdigits=5&type=page&initCount=0" border="0" />
        <p style="font-size: 10px; color: #64748b;">Core News 24x7 | Harsh Pratap Singh</p>
    </div>
</div>
